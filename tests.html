<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe App — Tests</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: monospace; color: #eee; padding: 24px 16px; max-width: 600px; margin: 0 auto; }
    h1 { color: #e07b4a; font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }
    .suite { margin-bottom: 24px; }
    .suite-name { color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 6px; }
    .test { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
    .pass { color: #4caf50; }
    .fail { color: #e07b4a; }
    .icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .name { flex: 1; color: #ccc; }
    .detail { color: #888; font-size: 11px; margin-top: 3px; }
    .error { color: #e07b4a; font-size: 11px; margin-top: 3px; }
    .summary { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-top: 24px; display: flex; gap: 24px; }
    .stat { text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .run-btn { background: #e07b4a; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 700; padding: 12px 0; width: 100%; cursor: pointer; margin-bottom: 24px; font-family: monospace; }
    .run-btn:disabled { opacity: 0.5; }
    .status { color: #888; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>🧪 Recipe App Tests</h1>
  <p class="subtitle">Core logic tests — run these before uploading a new version</p>
  <button class="run-btn" id="runBtn" onclick="runAll()">▶ Run All Tests</button>
  <div class="status" id="status">Not run yet</div>
  <div id="output"></div>
  <div class="summary" id="summary" style="display:none">
    <div class="stat"><div class="stat-num pass" id="passCount">0</div><div class="stat-label">Passed</div></div>
    <div class="stat"><div class="stat-num fail" id="failCount">0</div><div class="stat-label">Failed</div></div>
    <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total</div></div>
  </div>

  <script>
    // ── Paste the pure functions from index.html here for testing ──

    const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const SHORT_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    const SHOP_GROUPS = {
      "Frozen": ["frozen","ice"],
      "Produce": ["onion","garlic","tomato","pepper","carrot","potato","lettuce","spinach","rocket","avocado","lemon","lime","cucumber","mushroom","courgette","broccoli","coriander","parsley","basil","herb","vegetable","veg","salad","spring onion","celery","leek","ginger","chilli","aubergine","corn","pea","edamame","sweetcorn"],
      "Meat & Fish": ["chicken","beef","lamb","pork","salmon","tuna","fish","mince","steak","bacon","sausage","tofu","prawns","shrimp","turkey","duck"],
      "Dairy & Eggs": ["egg","milk","cream","butter","cheese","parmesan","feta","mozzarella","yogurt","yoghurt","halloumi","brie","ricotta","cheddar"],
      "Pasta & Grains": ["pasta","rice","noodle","orzo","gnocchi","quinoa","couscous","bread","flour","oat","muffin"],
      "Tins & Jars": ["tin","can","canned","chopped tomato","stock","sauce","mayo","ketchup","mustard","vinegar","jam","honey","syrup","soy","peri peri","harissa","miso","tahini","pesto","sriracha"],
      "Pantry": ["oil","salt","pepper","spice","paprika","cumin","turmeric","cinnamon","sugar","cornflour","baking","seasoning","chili flakes","chilli flakes","garlic granules","smoked paprika","dried"],
    };

    function getGroup(ing) {
      const lower = ing.toLowerCase();
      for (const [group, keywords] of Object.entries(SHOP_GROUPS)) {
        if (keywords.some(k => lower.includes(k))) return group;
      }
      return "Other";
    }

    function getMonday(d = new Date()) {
      const copy = typeof d === "string" ? new Date(d + "T12:00:00") : new Date(d);
      const day = copy.getDay();
      const diff = copy.getDate() - day + (day === 0 ? -6 : 1);
      copy.setDate(diff);
      return copy.toISOString().split("T")[0];
    }

    function dateToKey(d) {
      return d.toISOString().split("T")[0];
    }

    function getTodayKey() {
      const d = new Date();
      d.setHours(0,0,0,0);
      return dateToKey(d);
    }

    function getRollingDays() {
      const days = [];
      const today = new Date();
      today.setHours(0,0,0,0);
      for (let i = -7; i <= 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        days.push(d);
      }
      return days;
    }

    function scaleIngredient(ing, scale) {
      if (scale === 1) return ing;
      return ing.replace(/(\d+\.?\d*)/g, (m) => {
        const n = parseFloat(m) * scale;
        return Number.isInteger(n) ? n : Math.round(n * 10) / 10;
      });
    }

    function formatDayLabel(d) {
      return `${DAY_NAMES[d.getDay()].slice(0,3)} ${d.getDate()} ${SHORT_MONTHS[d.getMonth()]}`;
    }

    // ── Test runner ──────────────────────────────────────────────

    let passed = 0, failed = 0;
    const suites = [];

    function suite(name, tests) { suites.push({ name, tests }); }
    function test(name, fn) { return { name, fn }; }

    function expect(val) {
      return {
        toBe: (expected) => { if (val !== expected) throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(val)}`); },
        toEqual: (expected) => { if (JSON.stringify(val) !== JSON.stringify(expected)) throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(val)}`); },
        toContain: (item) => { if (!val.includes(item)) throw new Error(`Expected array/string to contain ${JSON.stringify(item)}`); },
        toBeTruthy: () => { if (!val) throw new Error(`Expected truthy, got ${JSON.stringify(val)}`); },
        toBeFalsy: () => { if (val) throw new Error(`Expected falsy, got ${JSON.stringify(val)}`); },
        toBeGreaterThan: (n) => { if (val <= n) throw new Error(`Expected ${val} > ${n}`); },
        toBeLessThan: (n) => { if (val >= n) throw new Error(`Expected ${val} < ${n}`); },
      };
    }

    // ── Test Suites ──────────────────────────────────────────────

    suite("getMonday — date calculations", [
      test("Monday returns itself", () => {
        expect(getMonday("2026-05-25")).toBe("2026-05-25"); // Monday
      }),
      test("Sunday returns previous Monday", () => {
        expect(getMonday("2026-05-31")).toBe("2026-05-25"); // Sunday → Mon
      }),
      test("Wednesday returns correct Monday", () => {
        expect(getMonday("2026-05-27")).toBe("2026-05-25"); // Wed → Mon
      }),
      test("Saturday returns correct Monday", () => {
        expect(getMonday("2026-05-30")).toBe("2026-05-25"); // Sat → Mon
      }),
      test("String date doesn't cause timezone shift", () => {
        // This was the bug — new Date("2026-05-25") parses as UTC and shifts a day in some timezones
        const result = getMonday("2026-05-25");
        expect(result).toBe("2026-05-25");
      }),
      test("Returns string in YYYY-MM-DD format", () => {
        const result = getMonday("2026-05-27");
        expect(/^\d{4}-\d{2}-\d{2}$/.test(result)).toBeTruthy();
      }),
    ]);

    suite("getRollingDays — planner window", [
      test("Returns exactly 15 days", () => {
        expect(getRollingDays().length).toBe(15);
      }),
      test("First day is 7 days ago", () => {
        const days = getRollingDays();
        const today = new Date(); today.setHours(0,0,0,0);
        const first = days[0];
        const diffDays = Math.round((today - first) / (1000*60*60*24));
        expect(diffDays).toBe(7);
      }),
      test("Last day is 7 days from now", () => {
        const days = getRollingDays();
        const today = new Date(); today.setHours(0,0,0,0);
        const last = days[days.length - 1];
        const diffDays = Math.round((last - today) / (1000*60*60*24));
        expect(diffDays).toBe(7);
      }),
      test("Today is in the middle (index 7)", () => {
        const days = getRollingDays();
        const todayKey = getTodayKey();
        expect(dateToKey(days[7])).toBe(todayKey);
      }),
    ]);

    suite("scaleIngredient — servings scaler", [
      test("Scale 1 returns unchanged", () => {
        expect(scaleIngredient("200g pasta", 1)).toBe("200g pasta");
      }),
      test("Scale 2 doubles numbers", () => {
        expect(scaleIngredient("200g pasta", 2)).toBe("400g pasta");
      }),
      test("Scale 0.5 halves numbers", () => {
        expect(scaleIngredient("200g pasta", 0.5)).toBe("100g pasta");
      }),
      test("Handles multiple numbers in ingredient", () => {
        expect(scaleIngredient("2 eggs and 100g cheese", 2)).toBe("4 eggs and 200g cheese");
      }),
      test("Rounds to 1 decimal", () => {
        expect(scaleIngredient("100g pasta", 1.5)).toBe("150g pasta");
      }),
      test("Fractional result rounds correctly", () => {
        expect(scaleIngredient("3 eggs", 1.5)).toBe("4.5 eggs");
      }),
      test("Text without numbers is unchanged", () => {
        expect(scaleIngredient("Salt and pepper", 3)).toBe("Salt and pepper");
      }),
    ]);

    suite("getGroup — shopping list categorization", [
      test("Pasta goes to Pasta & Grains", () => {
        expect(getGroup("175g pasta")).toBe("Pasta & Grains");
      }),
      test("Salmon goes to Meat & Fish", () => {
        expect(getGroup("2 salmon fillets")).toBe("Meat & Fish");
      }),
      test("Garlic goes to Produce", () => {
        expect(getGroup("3 cloves garlic, minced")).toBe("Produce");
      }),
      test("Parmesan goes to Dairy & Eggs", () => {
        expect(getGroup("20g parmesan, grated")).toBe("Dairy & Eggs");
      }),
      test("Frozen peas goes to Frozen", () => {
        expect(getGroup("1 cup frozen peas")).toBe("Frozen");
      }),
      test("Olive oil goes to Pantry", () => {
        expect(getGroup("2 tablespoon olive oil")).toBe("Pantry");
      }),
      test("Soy sauce goes to Tins & Jars", () => {
        expect(getGroup("2 tablespoon soy sauce")).toBe("Tins & Jars");
      }),
      test("Tofu goes to Meat & Fish", () => {
        expect(getGroup("200g extra firm tofu")).toBe("Meat & Fish");
      }),
      test("Unknown ingredient goes to Other", () => {
        expect(getGroup("Some weird ingredient XYZ")).toBe("Other");
      }),
      test("Smoked paprika goes to Pantry", () => {
        expect(getGroup("1 tsp smoked paprika")).toBe("Pantry");
      }),
      test("Eggs go to Dairy & Eggs", () => {
        expect(getGroup("4 eggs")).toBe("Dairy & Eggs");
      }),
      test("Avocado goes to Produce", () => {
        expect(getGroup("1 avocado, cubed")).toBe("Produce");
      }),
    ]);

    suite("PIN validation", [
      test("Correct PIN matches", () => {
        expect("0412" === "0412").toBeTruthy();
      }),
      test("Wrong PIN does not match", () => {
        expect("1234" === "0412").toBeFalsy();
      }),
      test("PIN is exactly 4 digits", () => {
        expect("0412".length).toBe(4);
      }),
    ]);

    suite("dateToKey — formatting", [
      test("Returns YYYY-MM-DD format", () => {
        const d = new Date("2026-05-24T12:00:00");
        expect(/^\d{4}-\d{2}-\d{2}$/.test(dateToKey(d))).toBeTruthy();
      }),
      test("Today key matches today", () => {
        const today = new Date(); today.setHours(0,0,0,0);
        expect(dateToKey(today)).toBe(getTodayKey());
      }),
    ]);

    // ── New helper functions for testing ──
    function logCook(cookLog, recipeId, recipeTitle) {
      const entry = { recipeId, recipeTitle, date: new Date().toISOString().split("T")[0] };
      return [entry, ...cookLog].slice(0, 50);
    }
    function addCustomShopItem(items, val) {
      if (!val.trim()) return items;
      return [...items, val.trim()];
    }
    function removeCustomShopItem(items, idx) {
      return items.filter((_, i) => i !== idx);
    }

    suite("Cook log", [
      test("Adds entry correctly", () => {
        const log = logCook([], "abc", "Pasta");
        expect(log.length).toBe(1);
        expect(log[0].recipeTitle).toBe("Pasta");
      }),
      test("Newest entry first", () => {
        let log = logCook([], "1", "First");
        log = logCook(log, "2", "Second");
        expect(log[0].recipeTitle).toBe("Second");
      }),
      test("Capped at 50 entries", () => {
        let log = [];
        for (let i = 0; i < 55; i++) log = logCook(log, String(i), `Recipe ${i}`);
        expect(log.length).toBe(50);
      }),
      test("Entry has YYYY-MM-DD date", () => {
        const log = logCook([], "x", "Test");
        expect(/^\d{4}-\d{2}-\d{2}$/.test(log[0].date)).toBeTruthy();
      }),
    ]);

    suite("Custom shopping items", [
      test("Adds item correctly", () => {
        const items = addCustomShopItem([], "Toilet paper");
        expect(items.length).toBe(1);
        expect(items[0]).toBe("Toilet paper");
      }),
      test("Ignores empty/whitespace", () => {
        const items = addCustomShopItem([], "   ");
        expect(items.length).toBe(0);
      }),
      test("Removes item by index", () => {
        const items = removeCustomShopItem(["a","b","c"], 1);
        expect(items.length).toBe(2);
        expect(items[1]).toBe("c");
      }),
      test("Removes first item", () => {
        const items = removeCustomShopItem(["a","b"], 0);
        expect(items[0]).toBe("b");
      }),
    ]);

    // ── Runner ───────────────────────────────────────────────────

    async function runAll() {
      passed = 0; failed = 0;
      const btn = document.getElementById("runBtn");
      btn.disabled = true;
      document.getElementById("status").textContent = "Running...";
      document.getElementById("output").innerHTML = "";
      document.getElementById("summary").style.display = "none";

      const output = document.getElementById("output");

      for (const suite of suites) {
        const suiteEl = document.createElement("div");
        suiteEl.className = "suite";
        suiteEl.innerHTML = `<div class="suite-name">${suite.name}</div>`;

        for (const t of suite.tests) {
          const testEl = document.createElement("div");
          testEl.className = "test";
          try {
            await t.fn();
            passed++;
            testEl.innerHTML = `<span class="icon pass">✓</span><div><div class="name">${t.name}</div></div>`;
          } catch(e) {
            failed++;
            testEl.innerHTML = `<span class="icon fail">✗</span><div><div class="name fail">${t.name}</div><div class="error">${e.message}</div></div>`;
          }
          suiteEl.appendChild(testEl);
        }
        output.appendChild(suiteEl);
      }

      document.getElementById("passCount").textContent = passed;
      document.getElementById("failCount").textContent = failed;
      document.getElementById("totalCount").textContent = passed + failed;
      document.getElementById("summary").style.display = "flex";
      document.getElementById("status").textContent = `Done — ${passed} passed, ${failed} failed`;
      btn.disabled = false;
    }
  </script>
</body>
</html>
