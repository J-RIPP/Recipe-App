    function getGroup(ing) {
      const lower = ing.toLowerCase();
      for (const [group, keywords] of Object.entries(SHOP_GROUPS)) {
        if (keywords.some(k => lower.includes(k))) return group;
      }
      return "Other";
    }

    function getRollingDays() {
      const days = [];
      const today = new Date();
      today.setHours(0,0,0,0);
      for (let i = -7; i <= 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        days.push(d);
      }
      return days;
    }

    function dateToKey(d) { return d.toISOString().split("T")[0]; }

    function formatCookDate(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      return `${DAY_NAMES[d.getDay()].slice(0,3)} ${d.getDate()} ${SHORT_MONTHS[d.getMonth()]}`;
    }

    function getMonday(d = new Date()) {
      const copy = typeof d === "string" ? new Date(d + "T12:00:00") : new Date(d);
      const day = copy.getDay();
      const diff = copy.getDate() - day + (day === 0 ? -6 : 1);
      copy.setDate(diff);
      return copy.toISOString().split("T")[0];
    }

    function getTodayKey() {
      const d = new Date();
      d.setHours(0,0,0,0);
      return dateToKey(d);
    }

    const H = {
      "Content-Type": "application/json",

    async function sbGet(table, query = "") {
      try {
        const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { headers: H });
        if (!res.ok) throw new Error(res.status);
        return res.json();
      } catch(e) { console.error("sbGet error", e); return []; }
    }
    async function sbPost(table, body) {
      try {
        const res = await fetch(`${SB_URL}/rest/v1/${table}`, { method:"POST", headers:H, body:JSON.stringify(body) });
        if (!res.ok) throw new Error(res.status);
        return res.json();
      } catch(e) { console.error("sbPost error", e); return null; }
    }
    async function sbPatch(table, query, body) {
      try {
        const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { method:"PATCH", headers:H, body:JSON.stringify(body) });
        if (!res.ok) throw new Error(res.status);
        return res.json();
      } catch(e) { console.error("sbPatch error", e); return null; }
    }
    async function sbDelete(table, query) {
      try {
        const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { method:"DELETE", headers:H });
        if (!res.ok) throw new Error(res.status);
      } catch(e) { console.error("sbDelete error", e); }
    }
    async function sbUpsert(table, body, onConflict) {
      try {
        const res = await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=${onConflict}`, { method:"POST", headers:{ ...H, "Prefer":"resolution=merge-duplicates,return=representation" }, body:JSON.stringify(body) });
        if (!res.ok) throw new Error(res.status);
        return res.json();
      } catch(e) { console.error("sbUpsert error", e); return null; }
    }

      const [servingsCount, setServingsCount] = useState(null); // null = use recipe default
      const fileInputRef = useRef(null);

      // useMemo for rolling days — only recalculates when date changes
      const todayKey = useMemo(() => getTodayKey(), []);
      const rollingDays = useMemo(() => getRollingDays(), [todayKey]);

      // Check PIN remember-me on mount
      useEffect(() => {
        try {
          const saved = localStorage.getItem("pinRemember");
          if (saved) {
            const { expiry } = JSON.parse(saved);
            if (Date.now() < expiry) setAuthed(true);
          }
          // Check if first time (show help)
          const visited = localStorage.getItem("hasVisited");
          if (!visited) { setShowHelp(true); localStorage.setItem("hasVisited","1"); }
        } catch(e) {}
      }, []);

      // Update weekStart if user leaves app open across week boundary
      useEffect(() => {
        const interval = setInterval(() => {
          const newMonday = getMonday();
          setWeekStart(prev => prev !== newMonday ? newMonday : prev);
        }, 60000); // check every minute
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (authed) {
          setAppLoading(true);
          setConnectionError(false);
          try {
            const stored = localStorage.getItem("customShopItems");
            if (stored) setCustomShopItems(JSON.parse(stored));
            const log = localStorage.getItem("cookLog");
            if (log) setCookLog(JSON.parse(log));
          } catch(e) {}
          const timeout = setTimeout(() => { setAppLoading(false); setConnectionError(true); }, 10000);
          Promise.all([fetchRecipes(), fetchPlannerData(), fetchShopTicks()])
            .then(() => { clearTimeout(timeout); setConnectionError(false); })
            .finally(() => { clearTimeout(timeout); setAppLoading(false); });
        }
      }, [authed]);

      // Auto-submit PIN on 4th digit
      useEffect(() => {
        if (pin.length === 4) {
          if (pin === CORRECT_PIN) {
            setAuthed(true);
            // Remember PIN for 7 days
            try { localStorage.setItem("pinRemember", JSON.stringify({ expiry: Date.now() + PIN_REMEMBER_DAYS * 86400000 })); } catch(e) {}
          } else {
            setPinError(true);
            setTimeout(() => { setPinError(false); setPin(""); }, 800);
          }
        }
      }, [pin]);

      function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 2500); }

      async function fetchRecipes() {
        const data = await sbGet("recipes", "order=created_at.desc");
        setRecipes(Array.isArray(data) ? data : []);
      }

      async function fetchPlannerData() {
        const start = rollingDays[0];
        const end = rollingDays[rollingDays.length - 1];
        const data = await sbGet("week_plan", `date=gte.${dateToKey(start)}&date=lte.${dateToKey(end)}&select=*,recipes(*)`);
        const plan = {};
        (Array.isArray(data) ? data : []).forEach(row => { if (row.date) plan[row.date] = row; });
        setPlannerData(plan);
      }

      async function fetchShopTicks() {
        const data = await sbGet("shopping_ticks", `week_start=eq.${weekStart}&ticked=eq.true`);
        const ticks = {};
        (Array.isArray(data) ? data : []).forEach(row => { ticks[row.ingredient] = true; });
        setShopTicks(ticks);
      }

      async function toggleShopTick(ing) {
        const newVal = !shopTicks[ing];
        setShopTicks(t => ({ ...t, [ing]: newVal }));
        if (newVal) {
          await sbUpsert("shopping_ticks", { week_start: weekStart, ingredient: ing, ticked: true }, "week_start,ingredient");
        } else {
          await sbDelete("shopping_ticks", `week_start=eq.${weekStart}&ingredient=eq.${ing.replace(/&/g,'%26').replace(/=/g,'%3D')}`);
        }
      }

      async function saveRecipeQuiet(recipe, onDone) {
        const result = await sbPost("recipes", recipe);
        if (!result) { showToast("❌ Save failed — check connection"); return; }
        if (onDone) onDone();
      }

      async function saveRecipe(recipe) {
        setLoading(true);
        const result = await sbPost("recipes", recipe);
        setLoading(false);
        if (!result) { showToast("❌ Save failed — check connection"); return; }
        showToast("Recipe saved!");
        fetchRecipes();
        setView("library");
        setForm({ title:"", category:"Dinner", source_url:"", ingredients:"", steps:"", photo_url:"", servings:2, prep_time:"", cook_time:"" });
        if (fileInputRef.current) fileInputRef.current.value = "";
      }

      async function deleteRecipe(id) {
        await sbDelete("week_plan", `recipe_id=eq.${id}`);
        await sbDelete("recipes", `id=eq.${id}`);
        showToast("Recipe deleted");
        fetchRecipes(); fetchPlannerData();
        setSelectedRecipe(null); setConfirmDelete(false);
        setView("library");
      }

      async function assignDay(dateKey, recipeId) {
        const existing = plannerData[dateKey];
        if (existing) await sbPatch("week_plan", `id=eq.${existing.id}`, { recipe_id: recipeId });
        else await sbPost("week_plan", { date: dateKey, recipe_id: recipeId, week_start: getMonday(dateKey) });
        await fetchPlannerData();
        showToast("Added to plan!");
      }

      async function unassignDay(dateKey) {
        const existing = plannerData[dateKey];
        if (existing) { await sbDelete("week_plan", `id=eq.${existing.id}`); fetchPlannerData(); }
      }

      async function updateRecipe(id, updates) {
        setLoading(true);
        const result = await sbPatch("recipes", `id=eq.${id}`, updates);

      function handleJsonUpload(e) {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        setUploadError("");
        let errorCount = 0, successCount = 0;
        const total = files.length;
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const data = JSON.parse(ev.target.result);
              if (!data.title) { errorCount++; if (errorCount+successCount===total) setUploadError(`${errorCount} file(s) failed — missing title.`); return; }
              saveRecipeQuiet({
                title:data.title, category:data.category||"Dinner",
                source_url:data.source_url||null, photo_url:data.photo_url||null,
                ingredients:Array.isArray(data.ingredients)?data.ingredients:[],
                steps:Array.isArray(data.steps)?data.steps:[],
                servings:data.servings||2, prep_time:data.prep_time||null, cook_time:data.cook_time||null,
                is_favourite:false, rating:0, notes:null,
              }, () => {
                successCount++;
                if (successCount+errorCount===total) {
                  fetchRecipes(); setView("library");
                  showToast(`${successCount} recipe${successCount>1?"s":""} saved!`);
                  if (errorCount > 0) setUploadError(`${errorCount} file(s) failed.`);
                }
              });
            } catch { errorCount++; if (errorCount+successCount===total) setUploadError(`${errorCount} file(s) could not be parsed.`); }
          };
          reader.readAsText(file);
        });
        e.target.value = "";
      }

        if (scale === 1) return ing;
        return ing.replace(/(\d+\.?\d*)/g, (m) => {

        });

          groups[g].push(ing);

        return groups;

                    <button aria-label="Increase servings" onClick={() => setServingsCount(s => (s !== null ? s : baseServings) + 1)}

                    {servingsCount !== null && <button onClick={() => setServingsCount(null)} style={{ background:"none", border:"none", color:C.textMuted, fontSize:12, cursor:"pointer" }}>Reset</button>}
                  </div>

                  <div style={s.sectionLabel}>Ingredients</div>
                  {(selectedRecipe.ingredients||[]).map((ing,i) => (
                    <div key={i} style={s.listItem}>• {scaleIngredient(ing, servingsScale)}</div>
                  ))}
                  <div style={s.sectionLabel}>Steps</div>
                  {(selectedRecipe.steps||[]).length === 0
                    ? <div style={{ color:C.textSub, fontSize:14, fontStyle:"italic" }}>No steps added yet — tap Edit to add them.</div>
                    : (selectedRecipe.steps||[]).map((step,i) => <div key={i} style={s.listItem}><span style={s.stepNum}>{i+1}</span> {step}</div>)}

                  <div style={s.sectionLabel}>Add to plan</div>
                  <div style={{ color:C.textMuted, fontSize:12, marginBottom:10 }}>Tap a date to plan this recipe</div>
                  <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:8, marginBottom:16 }}>
                    {rollingDays.map(d => {
                      const dk = dateToKey(d);
                      const isToday = dk === todayKey;
                      const isPlanned = plannerData[dk]?.recipe_id === selectedRecipe.id;
                      return (
                        <div key={dk} role="button" aria-label={`${isPlanned?"Remove from":"Plan for"} ${DAY_NAMES[d.getDay()]} ${d.getDate()} ${SHORT_MONTHS[d.getMonth()]}`}
                          onClick={() => assignDay(dk, selectedRecipe.id)}
                          style={{ flexShrink:0, textAlign:"center", cursor:"pointer", padding:"8px 10px", borderRadius:10, minWidth:44, minHeight:44,
                            background: isPlanned?C.accent:isToday?C.surface2:C.surface,
                            border: isToday?`1px solid ${C.accent}`:`1px solid ${C.border}` }}>
                          <div style={{ fontSize:10, color:isPlanned?C.bg:C.textSub }}>{DAY_NAMES[d.getDay()].slice(0,3)}</div>
                          <div style={{ fontSize:14, fontWeight:700, color:isPlanned?C.bg:isToday?C.accent:C.text }}>{d.getDate()}</div>
                        </div>
                      );
                    })}
                  </div>
                  <button style={s.cookBtn} onClick={() => { setCookStep(0); setView("cook"); }}>🍳 Start Cooking</button>
                </div>
              </>
            )}
          </div>
        );
      }

      // ── MAIN APP ───────────────────────────────────────────────────────────
      return (
        <div style={s.app}>
          {toast && <div role="status" aria-live="polite" style={s.toast}>{toast}</div>}
          <div style={s.header}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <svg width="28" height="14" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <ellipse cx="60" cy="35" rx="38" ry="28" fill="none" stroke={C.text} strokeWidth="7"/>
                  <ellipse cx="140" cy="35" rx="38" ry="28" fill="none" stroke={C.text} strokeWidth="7"/>
                  <rect x="98" y="30" width="4" height="10" fill={C.text}/>
                  <line x1="22" y1="35" x2="0" y2="28" stroke={C.text} strokeWidth="5" strokeLinecap="round"/>
                  <line x1="178" y1="35" x2="200" y2="28" stroke={C.text} strokeWidth="5" strokeLinecap="round"/>
                  <rect x="32" y="20" width="6" height="20" fill={C.done} rx="1"/>
                  <rect x="42" y="26" width="6" height="14" fill={C.accent} rx="1"/>
                  <rect x="52" y="15" width="6" height="25" fill={C.done} rx="1"/>
                  <polyline points="110,45 120,28 130,35 150,20 160,30" stroke={C.accent} strokeWidth="4" fill="none" strokeLinecap="round"/>
                  <circle cx="160" cy="30" r="4" fill={C.accent}/>
                </svg>
                <span style={s.headerTitle}>Our Recipes</span>
              </div>
              <button aria-label="Help" onClick={() => setShowHelp(true)} style={{ background:"none", border:"none", color:C.textMuted, fontSize:18, cursor:"pointer", padding:"4px 8px" }} title={}>?</button>
            </div>
          </div>

          <div style={s.content}>

            {/* LIBRARY */}
            {view === "library" && (
              <div>
                {/* Tonight banner */}
                {tonightRecipe ? (
                  <div role="button" aria-label={`Tonight's dinner: ${tonightRecipe.title}`}
                    onClick={() => { setSelectedRecipe(tonightRecipe); setPrevView("library"); setServingsCount(null); setView("detail"); }}
                    style={{ background:"#0f2018", border:`1px solid ${C.accentDim}`, borderRadius:14, padding:"12px 14px", marginBottom:16, cursor:"pointer", display:"flex", alignItems:"center", gap:12 }}>
                    {tonightRecipe.photo_url
                      ? <img src={tonightRecipe.photo_url} alt={tonightRecipe.title} style={{ width:48, height:48, borderRadius:8, objectFit:"cover", flexShrink:0 }} loading="lazy" />
                      : <div style={{ width:48, height:48, borderRadius:8, background:C.surface3, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>🍴</div>}
                    <div>
                      <div style={{ fontSize:10, color:C.accent, textTransform:"uppercase", letterSpacing:1.5, marginBottom:2 }}>Tonight's Dinner</div>
                      <div style={{ color:C.text, fontSize:15, fontWeight:600 }}>{tonightRecipe.title}</div>
                    </div>
                    <div style={{ marginLeft:"auto", color:C.textSub, fontSize:18 }}>›</div>
                  </div>
                ) : (
                  <div onClick={() => setView("planner")}
                    style={{ background:C.surface, border:`1px dashed ${C.border}`, borderRadius:14, padding:"12px 14px", marginBottom:16, cursor:"pointer", display:"flex", alignItems:"center", gap:12 }}>
                    <div style={{ fontSize:24 }}>📅</div>
                    <div style={{ color:C.textSub, fontSize:14 }}>Nothing planned for tonight — tap to plan</div>
                  </div>
                )}

                {/* Cook log */}
                {cookLog.length > 0 && (
                  <div style={{ marginBottom:12 }}>
                    <div style={{ fontSize:11, color:C.textFaint, textTransform:"uppercase", letterSpacing:1.5, marginBottom:6 }}>Recently cooked</div>
                    <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:4 }}>
                      {cookLog.slice(0,5).map((entry, i) => (
                        <div key={i} style={{ flexShrink:0, background:C.surface, borderRadius:10, padding:"6px 12px", fontSize:12, color:C.textSub, whiteSpace:"nowrap" }}>
                          {entry.recipeTitle} <span style={{ color:C.textFaint }}>· {formatCookDate(entry.date)}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Search + sort */}
                <div style={{ display:"flex", gap:8, marginBottom:10 }}>
                  <input style={{ ...s.searchInput, marginBottom:0, flex:1 }} placeholder="Search recipes..." value={search} onChange={e => setSearch(e.target.value)} aria-label="Search recipes" />
                  <select value={sortBy} onChange={e => setSortBy(e.target.value)} aria-label="Sort recipes"
                    style={{ background:C.surface2, border:`1px solid ${C.border}`, borderRadius:10, color:C.textSub, padding:"0 10px", fontSize:13, flexShrink:0 }}>
                    <option value="newest">New</option>
                    <option value="az">A–Z</option>
                    <option value="rating">★</option>
                  </select>
                </div>

                <div style={s.catRow} role="group" aria-label="Filter by category">
                  <button style={{ ...s.catBtn, ...(filterFav?s.catBtnActive:{}) }} onClick={() => { setFilterFav(f=>!f); setFilterCat("All"); }} aria-pressed={filterFav}>♥ Faves</button>
                  {["All",...CATEGORIES].map(c => (
                    <button key={c} style={{ ...s.catBtn, ...(filterCat===c&&!filterFav?s.catBtnActive:{}) }} onClick={() => { setFilterCat(c); setFilterFav(false); }} aria-pressed={filterCat===c&&!filterFav}>{c}</button>
                  ))}
                </div>

                {filteredRecipes.length===0 && <div style={s.empty}>{recipes.length===0?"No recipes yet. Add one!":"No recipes match."}</div>}
                <div style={s.recipeGrid} role="list">
                  {filteredRecipes.map(r => {
                    const upcomingDates = Object.entries(plannerData).filter(([k,v]) => v?.recipe_id===r.id && k>=todayKey).map(([k])=>k);
                    return (
                      <div key={r.id} role="listitem" style={s.recipeCard}
                        onClick={() => { setSelectedRecipe(r); setPrevView("library"); setServingsCount(null); setView("detail"); }}>
                        {r.is_favourite && <div aria-label="Favourite" style={{ position:"absolute", top:6, right:8, fontSize:16, color:C.accent, zIndex:1 }}>♥</div>}
                        {r.photo_url
                          ? <img src={r.photo_url} alt={r.title} style={s.recipeThumb} loading="lazy" />
                          : <div style={s.recipePlaceholder} aria-hidden="true">🍴</div>}
                        <div style={s.recipeCardBody}>
                          <div style={s.recipeCardCat}>{r.category}</div>
                          <div style={s.recipeCardTitle}>{r.title}</div>
                          {(r.prep_time||r.cook_time) && <div style={{ fontSize:10, color:C.textMuted, marginTop:3 }}>{[r.prep_time&&`⏱${r.prep_time}`,r.cook_time&&`🍳${r.cook_time}`].filter(Boolean).join(" · ")}</div>}
                          {upcomingDates.length>0 && <div style={{ fontSize:10, color:C.textSub, marginTop:3 }}>📅 {upcomingDates.length>1?`${upcomingDates.length} days planned`:formatCookDate(upcomingDates[0])}</div>}
                          {r.rating>0 && <div aria-label={`${r.rating} stars`} style={{ fontSize:11, color:C.accent, marginTop:2 }}>{"★".repeat(r.rating)}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ADD RECIPE */}
            {view === "add" && (
              <div style={s.formWrap}>
                <h2 style={s.formHeading}>Add Recipe</h2>

                {/* Quick add toggle */}
                <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                  <button onClick={() => setQuickAdd(false)} style={{ ...s.catBtn, ...((!quickAdd)?s.catBtnActive:{}) }}>Full recipe</button>
                  <button onClick={() => setQuickAdd(true)} style={{ ...s.catBtn, ...(quickAdd?s.catBtnActive:{}) }}>⚡ Quick add</button>
                </div>

                {quickAdd ? (
                  <div>
                    <div style={{ color:C.textSub, fontSize:13, marginBottom:16 }}>Just the essentials — add steps later via Edit.</div>
                    <label style={s.label} htmlFor="quick-title">Recipe name *</label>
                    <input id="quick-title" style={s.input} value={quickTitle} onChange={e => setQuickTitle(e.target.value)} placeholder="e.g. Pasta Carbonara" />
                    <label style={s.label} htmlFor="quick-ings">Ingredients (one per line)</label>
                    <textarea id="quick-ings" style={s.textarea} rows={5} value={quickIngredients} onChange={e => setQuickIngredients(e.target.value)} placeholder={"200g pasta\n2 eggs\n100g pancetta"} />
                    <button style={s.submitBtn} onClick={handleQuickAdd} disabled={loading}>{loading?"Saving...":"Save Recipe"}</button>
                  </div>
                ) : (
                  <div>
                    <div style={s.uploadBox}>
                      <div style={s.uploadLabel}>📎 Upload from Claude JSON</div>
                      <div style={{ color:C.textMuted, fontSize:12, marginBottom:10 }}>Select one or multiple files at once</div>
                      <label style={s.uploadBtn}>
                        Choose files
                        <input ref={fileInputRef} type="file" accept=".json" multiple style={{ display:"none" }} onChange={handleJsonUpload} aria-label="Upload JSON recipe files" />
                      </label>
                      {uploadError && <div role="alert" style={{ color:C.danger, fontSize:13, marginTop:6 }}>{uploadError}</div>}
                    </div>
                    <div style={s.divider}>— or fill in manually —</div>
                    <label style={s.label} htmlFor="add-title">Title *</label>
                    <input id="add-title" style={s.input} value={form.title} onChange={e => setForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Pasta Carbonara" />
                    <label style={s.label} htmlFor="add-cat">Category</label>
                    <select id="add-cat" style={s.input} value={form.category} onChange={e => setForm(f=>({...f,category:e.target.value}))}>
                      {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                    </select>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                      <div><label style={s.label} htmlFor="add-prep">Prep time</label><input id="add-prep" style={s.input} value={form.prep_time} onChange={e => setForm(f=>({...f,prep_time:e.target.value}))} placeholder="10 min" /></div>
                      <div><label style={s.label} htmlFor="add-cook">Cook time</label><input id="add-cook" style={s.input} value={form.cook_time} onChange={e => setForm(f=>({...f,cook_time:e.target.value}))} placeholder="30 min" /></div>
                    </div>
                    <label style={s.label} htmlFor="add-servings">Servings</label>
                    <input id="add-servings" style={s.input} type="number" min="1" value={form.servings} onChange={e => setForm(f=>({...f,servings:e.target.value}))} />
                    <label style={s.label} htmlFor="add-source">Source URL (optional)</label>
                    <input id="add-source" style={s.input} value={form.source_url} onChange={e => setForm(f=>({...f,source_url:e.target.value}))} placeholder="https://..." />
                    <label style={s.label} htmlFor="add-photo">Photo URL (optional)</label>
                    <input id="add-photo" style={s.input} value={form.photo_url} onChange={e => setForm(f=>({...f,photo_url:e.target.value}))} placeholder="https://..." />
                    <label style={s.label} htmlFor="add-ings">Ingredients (one per line)</label>
                    <textarea id="add-ings" style={s.textarea} value={form.ingredients} onChange={e => setForm(f=>({...f,ingredients:e.target.value}))} placeholder={"200g pasta\n2 eggs\n100g pancetta"} rows={5} />
                    <label style={s.label} htmlFor="add-steps">Steps (one per line)</label>
                    <textarea id="add-steps" style={s.textarea} value={form.steps} onChange={e => setForm(f=>({...f,steps:e.target.value}))} placeholder={"Boil pasta\nFry pancetta\nMix eggs and cheese"} rows={5} />
                    {formError && <div role="alert" style={{ color:C.danger, marginBottom:8 }}>{formError}</div>}
                    <button style={s.submitBtn} onClick={handleFormSubmit} disabled={loading}>{loading?"Saving...":"Save Recipe"}</button>
                  </div>
                )}
              </div>
            )}

            {/* ROLLING PLANNER */}
            {view === "planner" && (
              <div>
                <h2 style={{ ...s.formHeading, marginBottom:16 }}>Meal Planner</h2>
                {rollingDays.map(d => {
                  const dk = dateToKey(d);
                  const row = plannerData[dk];
                  const recipe = row?.recipes;
                  const isToday = dk === todayKey;
                  const isPast = dk < todayKey;
                  return (
                    <div key={dk} style={{ ...s.plannerRow, ...(isToday?{border:`1px solid ${C.accent}`, background:"#0f2018"}:{}), ...(isPast?{opacity:0.5}:{}) }}>
                      <div style={{ width:72, flexShrink:0 }}>
                        <div style={{ fontSize:12, fontWeight:700, color:isToday?C.accent:C.textSub }}>
                          {DAY_NAMES[d.getDay()].slice(0,3).toUpperCase()}
                          {isToday && <span style={{ fontSize:8, display:"block", letterSpacing:1, color:C.accent }}>TODAY</span>}
                        </div>
                        <div style={{ fontSize:11, color:C.textFaint }}>{d.getDate()} {SHORT_MONTHS[d.getMonth()]}</div>
                      </div>
                      {recipe
                        ? <div style={s.plannerRecipe}>
                            {recipe.photo_url
                              ? <img src={recipe.photo_url} alt={recipe.title} style={{ width:44, height:44, borderRadius:8, objectFit:"cover", flexShrink:0 }} loading="lazy" />
                              : <div style={{ width:44, height:44, borderRadius:8, background:C.surface3, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }} aria-hidden="true">🍴</div>}
                            <div style={{ flex:1, minWidth:0 }}>
                              <span style={s.plannerRecipeName} onClick={() => { setSelectedRecipe(recipe); setPrevView("planner"); setServingsCount(null); setView("detail"); }}>{recipe.title}</span>
                              {isToday && (
                                <div role="button" onClick={() => logCook(recipe.id, recipe.title)}
                                  style={{ fontSize:11, color:C.done, cursor:"pointer", marginTop:3 }}>✓ Mark as cooked</div>
                              )}
                            </div>
                            {!isPast && <button aria-label={`Remove ${recipe.title} from ${DAY_NAMES[d.getDay()]}`} style={s.plannerRemove} onClick={() => unassignDay(dk)}>✕</button>}
                          </div>
                        : !isPast && (
                          <div style={{ flex:1 }}>
                            <button aria-label={`Add recipe to ${DAY_NAMES[d.getDay()]} ${d.getDate()} ${SHORT_MONTHS[d.getMonth()]}`}
                              onClick={() => { setPickerDay(dk); setPickerSearch(""); }}
                              style={{ background:C.surface2, border:`1px dashed ${C.border}`, borderRadius:10, color:C.textMuted, fontSize:13, padding:"10px 16px", cursor:"pointer", display:"flex", alignItems:"center", gap:6, minHeight:44 }}>
                              <span style={{ color:C.accent, fontSize:16 }}>+</span> Add
                            </button>
                          </div>
                        )}
                    </div>
                  );
                })}

                {/* Recipe picker overlay */}
                {pickerDay && (
                  <div style={s.overlay} role="dialog" aria-modal="true" aria-label="Pick a recipe">
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 16px", background:C.surface, borderBottom:`1px solid ${C.border2}`, flexShrink:0 }}>
                      <span style={{ color:C.text, fontSize:16, fontWeight:700 }}>
                        Pick for {DAY_NAMES[new Date(pickerDay+"T12:00:00").getDay()]} {new Date(pickerDay+"T12:00:00").getDate()} {SHORT_MONTHS[new Date(pickerDay+"T12:00:00").getMonth()]}
                      </span>
                      <button aria-label="Close picker" onClick={() => setPickerDay(null)} style={{ background:"none", border:"none", color:C.textSub, fontSize:22, cursor:"pointer", padding:"4px 8px", minWidth:44, minHeight:44 }}>✕</button>
                    </div>
                    <div style={{ padding:"12px 16px 8px", flexShrink:0 }}>
                      <input style={s.searchInput} placeholder="Search recipes..." value={pickerSearch} onChange={e => setPickerSearch(e.target.value)} aria-label="Search recipes" autoFocus />
                    </div>
                    <div style={{ overflowY:"auto", flex:1 }}>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, padding:"0 16px 24px" }}>
                        {recipes.filter(r => r.title.toLowerCase().includes(pickerSearch.toLowerCase())).map(r => (
                          <div key={r.id} role="button" aria-label={`Select ${r.title}`}
                            onClick={() => { assignDay(pickerDay, r.id); setPickerDay(null); }}
                            style={{ background:C.surface, borderRadius:14, overflow:"hidden", cursor:"pointer", border:`1px solid ${C.border}` }}>
                            {r.photo_url
                              ? <img src={r.photo_url} alt={r.title} style={{ width:"100%", height:110, objectFit:"cover" }} loading="lazy" />
                              : <div style={{ width:"100%", height:110, background:C.surface3, display:"flex", alignItems:"center", justifyContent:"center", fontSize:36 }} aria-hidden="true">🍴</div>}
                            <div style={{ padding:"8px 10px 10px" }}>
                              <div style={{ fontSize:11, color:C.accent, textTransform:"uppercase", letterSpacing:1, marginBottom:3 }}>{r.category}</div>
                              <div style={{ fontSize:13, color:C.text, fontWeight:600, lineHeight:1.3 }}>{r.title}</div>
                              {r.rating>0 && <div aria-label={`${r.rating} stars`} style={{ fontSize:10, color:C.accent, marginTop:2 }}>{"★".repeat(r.rating)}</div>}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* SHOPPING LIST */}
            {view === "shopping" && (
              <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                  <h2 style={{ ...s.formHeading, marginBottom:0 }}>Shopping List</h2>
                  {(Object.keys(shopTicks).length > 0 || customShopItems.length > 0) && (
                    <button onClick={async () => {
                      await sbDelete("shopping_ticks", `week_start=eq.${weekStart}`);
                      setShopTicks({}); setCustomShopItems([]);
                      try { localStorage.removeItem("customShopItems"); } catch(e) {}
                      showToast("List cleared!");
                    }} style={{ background:C.surface2, border:`1px solid ${C.border}`, borderRadius:8, color:C.textSub, fontSize:12, padding:"6px 12px", cursor:"pointer" }}>Clear all</button>
                  )}
                </div>
                {(() => {
                  const groups = buildShopGroups();
                  const allGroups = [...Object.keys(SHOP_GROUPS), "Other"].filter(g => groups[g]?.length > 0);
                  const hasCustom = customShopItems.length > 0;
                  if (allGroups.length === 0 && !hasCustom) return (
                    <div style={{ textAlign:"center", marginTop:40 }}>
                      <div style={{ fontSize:40, marginBottom:12 }}>🛒</div>
                      <div style={{ color:C.textSub, fontSize:15 }}>Plan your week first to generate a list!</div>
                      <button onClick={() => setView("planner")} style={{ ...s.submitBtn, marginTop:16, maxWidth:200, padding:"12px 0" }}>Go to planner</button>
                    </div>
                  );
                  return <>
                    <div style={{ color:C.textSub, fontSize:13, marginBottom:16 }}>Synced for both of you · resets each week</div>
                    {allGroups.map(g => {
                      const ings = groups[g];
                      const unticked = ings.filter(i => !shopTicks[i]);
                      const ticked = ings.filter(i => shopTicks[i]);
                      return (
                        <div key={g} style={s.shopGroup}>
                          <div style={s.shopGroupLabel}>{g} {ticked.length>0 && <span style={{ color:C.textFaint, fontWeight:400 }}>({ticked.length}/{ings.length})</span>}</div>
                          {unticked.map((ing,i) => (
                            <div key={i} role="checkbox" aria-checked={false} aria-label={ing} style={s.shopItem} onClick={() => toggleShopTick(ing)}>
                              <div style={s.shopCheck} aria-hidden="true"></div>
                              <span style={{ color:C.text }}>{ing}</span>
                            </div>
                          ))}
                          {ticked.map((ing,i) => (
                            <div key={i} role="checkbox" aria-checked={true} aria-label={`${ing}, ticked`} style={s.shopItem} onClick={() => toggleShopTick(ing)}>
                              <div style={{ ...s.shopCheck, ...s.shopCheckDone }} aria-hidden="true">✓</div>
                              <span style={{ textDecoration:"line-through", color:C.textFaint }}>{ing}</span>
                            </div>
                          ))}
                        </div>
                      );
                    })}
                    {/* Custom items */}
                    {(customShopItems.length > 0 || true) && (
                      <div style={s.shopGroup}>
                        {customShopItems.length > 0 && <div style={s.shopGroupLabel}>Extra items</div>}
                        {customShopItems.map((item, i) => (
                          <div key={i} style={{ ...s.shopItem, justifyContent:"space-between" }}>
                            <div style={{ display:"flex", alignItems:"center", gap:12, flex:1 }} role="checkbox" aria-checked={!!shopTicks["__custom__"+item]} aria-label={item} onClick={() => toggleShopTick("__custom__"+item)}>
                              <div style={{ ...s.shopCheck, ...(shopTicks["__custom__"+item]?s.shopCheckDone:{}) }} aria-hidden="true">{shopTicks["__custom__"+item]?"✓":""}</div>
                              <span style={{ textDecoration:shopTicks["__custom__"+item]?"line-through":"none", color:shopTicks["__custom__"+item]?C.textFaint:C.text }}>{item}</span>
                            </div>
                            <button aria-label={`Remove ${item}`} onClick={() => removeCustomShopItemFn(i)} style={{ background:"none", border:"none", color:C.textFaint, fontSize:16, cursor:"pointer", padding:"4px 8px", minWidth:36, minHeight:36 }}>✕</button>
                          </div>
                        ))}
                        <div style={{ display:"flex", gap:8, marginTop:10 }}>
                          <input aria-label="Add custom item" style={{ ...s.input, flex:1, padding:"10px 12px", fontSize:14 }}
                            value={newCustomItem} onChange={e => setNewCustomItem(e.target.value)}
                            onKeyDown={e => e.key==="Enter" && addCustomShopItemFn()}
                            placeholder="Add item..." />
                          <button aria-label="Add item" onClick={addCustomShopItemFn} style={{ background:C.accent, border:"none", borderRadius:10, color:C.bg, fontWeight:700, fontSize:20, width:44, height:44, cursor:"pointer", flexShrink:0 }}>+</button>
                        </div>
                      </div>
                    )}
                  </>;
                })()}
              </div>
            )}
          </div>

          <div style={s.nav} role="navigation" aria-label="Main navigation">
            {[{id:"library",icon:"📚",label:"Recipes"},{id:"add",icon:"📝",label:"Add"},{id:"planner",icon:"📅",label:"Planner"},{id:"shopping",icon:"🛒",label:"Shopping"}].map(tab => (
              <button key={tab.id} aria-label={tab.label} aria-current={view===tab.id?"page":undefined}
                style={{ ...s.navBtn, ...(view===tab.id?s.navBtnActive:{}) }} onClick={() => setView(tab.id)}>
                <span style={s.navIcon} aria-hidden="true">{tab.icon}</span>
                <span style={s.navLabel}>{tab.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
