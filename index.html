    function getMonday(d = new Date()) {
      const copy = new Date(d);
      const day = copy.getDay();
      const diff = copy.getDate() - day + (day === 0 ? -6 : 1);
      copy.setDate(diff);
      return copy.toISOString().split("T")[0];
    }

    const H = {
      "Content-Type": "application/json",
      "apikey": SB_KEY,
      "Authorization": `Bearer ${SB_KEY}`,
      "Prefer": "return=representation",
    };

    async function sbGet(table, query = "") {
      const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { headers: H });
      return res.json();
    }
    async function sbPost(table, body) {
      const res = await fetch(`${SB_URL}/rest/v1/${table}`, { method: "POST", headers: H, body: JSON.stringify(body) });
      return res.json();
    }
    async function sbPatch(table, query, body) {
      const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { method: "PATCH", headers: H, body: JSON.stringify(body) });
      return res.json();
    }
    async function sbDelete(table, query) {
      await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { method: "DELETE", headers: H });
    }

    function App() {
      const [pin, setPin] = useState("");
      const [authed, setAuthed] = useState(false);
      const [pinError, setPinError] = useState(false);
      const [view, setView] = useState("library");
      const [recipes, setRecipes] = useState([]);
      const [weekPlan, setWeekPlan] = useState({});
      const [selectedRecipe, setSelectedRecipe] = useState(null);
      const [cookStep, setCookStep] = useState(0);
      const [loading, setLoading] = useState(false);
      const [shoppingChecked, setShoppingChecked] = useState({});
      const [weekStart] = useState(getMonday());
      const [search, setSearch] = useState("");
      const [filterCat, setFilterCat] = useState("All");
      const [form, setForm] = useState({ title:"", category:"Dinner", source_url:"", ingredients:"", steps:"", photo_url:"" });
      const [formError, setFormError] = useState("");
      const [uploadError, setUploadError] = useState("");
      const [toast, setToast] = useState("");

      useEffect(() => { if (authed) { fetchRecipes(); fetchWeekPlan(); } }, [authed]);

      function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 2500); }

      async function fetchRecipes() {
        const data = await sbGet("recipes", "order=created_at.desc");
        setRecipes(Array.isArray(data) ? data : []);
      }

      async function fetchWeekPlan() {
        const data = await sbGet("week_plan", `week_start=eq.${weekStart}&select=*,recipes(*)`);
        const plan = {};
        (Array.isArray(data) ? data : []).forEach(row => { plan[row.day] = row; });
        setWeekPlan(plan);
      }

      async function saveRecipe(recipe) {
        setLoading(true);
        await sbPost("recipes", recipe);
        setLoading(false);
        showToast("Recipe saved!");
        fetchRecipes();
        setView("library");
      }

      async function deleteRecipe(id) {
        await sbDelete("week_plan", `recipe_id=eq.${id}`);
        await sbDelete("recipes", `id=eq.${id}`);
        showToast("Recipe deleted");
        fetchRecipes(); fetchWeekPlan();
        setSelectedRecipe(null); setView("library");
      }

      async function assignDay(day, recipeId) {
        const existing = weekPlan[day];
        if (existing) await sbPatch("week_plan", `id=eq.${existing.id}`, { recipe_id: recipeId });
        else await sbPost("week_plan", { day, recipe_id: recipeId, week_start: weekStart });
        fetchWeekPlan();
        showToast(`Assigned to ${day}!`);
      }

      async function unassignDay(day) {
        const existing = weekPlan[day];
        if (existing) { await sbDelete("week_plan", `id=eq.${existing.id}`); fetchWeekPlan(); }
      }

      function handlePinSubmit() {
        async function checkPin() {
          const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
          const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
          if (hash === CORRECT_PIN_HASH) { setAuthed(true); }
          else { setPinError(true); setTimeout(() => setPinError(false), 800); }
        }
        checkPin();
      }

      function handleFormSubmit() {
        if (!form.title.trim()) { setFormError("Title is required"); return; }
        saveRecipe({
          title: form.title.trim(), category: form.category,
          source_url: form.source_url.trim() || null, photo_url: form.photo_url.trim() || null,
          ingredients: form.ingredients.split("\n").filter(l => l.trim()),
          steps: form.steps.split("\n").filter(l => l.trim()),
        });
        setForm({ title:"", category:"Dinner", source_url:"", ingredients:"", steps:"", photo_url:"" });
        setFormError("");
      }

      function handleJsonUpload(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!data.title) { setUploadError("Invalid file — missing title."); return; }
            saveRecipe({ title:data.title, category:data.category||"Dinner", source_url:data.source_url||null, photo_url:data.photo_url||null, ingredients:Array.isArray(data.ingredients)?data.ingredients:[], steps:Array.isArray(data.steps)?data.steps:[] });
            setUploadError("");
          } catch { setUploadError("Could not parse file."); }
        };
        reader.readAsText(file);
      }

      const filteredRecipes = recipes.filter(r =>
        r.title.toLowerCase().includes(search.toLowerCase()) && (filterCat === "All" || r.category === filterCat)
      );

      if (!authed) return (
        <div style={s.pinScreen}>
          <div style={s.pinCard}>
            <div style={s.pinLogo}>🍽️</div>
            <h1 style={s.pinTitle}>Our Recipes</h1>
            <p style={s.pinSub}>Enter PIN to continue</p>
            <div style={{ display:"flex", gap:8, justifyContent:"center", margin:"20px 0" }}>
              {[0,1,2,3].map(i => <div key={i} style={{ ...s.pinDot, background: pin.length > i ? "#e07b4a" : "#3a3a3a" }} />)}
            </div>
            <div style={s.pinGrid}>
              {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i) => (
                <button key={i} style={{ ...s.pinBtn, ...(k===""?{opacity:0,pointerEvents:"none"}:{}), ...(pinError?{background:"#5a1a1a"}:{}) }}
                  onClick={() => { if(k==="⌫") setPin(p=>p.slice(0,-1)); else if(k!==""&&pin.length<4) setPin(p=>p+k); }}>{k}</button>
              ))}
            </div>
            <button style={s.pinEnter} onClick={handlePinSubmit}>Enter</button>
            {pinError && <p style={{ color:"#e07b4a", textAlign:"center", marginTop:8 }}>Wrong PIN</p>}
          </div>
        </div>
      );

      if (view === "cook" && selectedRecipe) {
        const steps = selectedRecipe.steps || [];
        return (
          <div style={s.cookScreen}>
            <div style={s.cookHeader}>
              <button style={s.backBtn} onClick={() => { setView("library"); setCookStep(0); }}>← Back</button>
              <span style={s.cookTitle}>{selectedRecipe.title}</span>
            </div>
            <div style={s.cookBody}>
              <div style={s.cookStepNum}>Step {cookStep+1} of {steps.length}</div>
              <div style={s.cookStepText}>{steps[cookStep]}</div>
              <div style={s.cookNav}>
                <button style={{ ...s.cookNavBtn, opacity:cookStep===0?0.3:1 }} disabled={cookStep===0} onClick={() => setCookStep(c=>c-1)}>← Prev</button>
                {cookStep < steps.length-1
                  ? <button style={s.cookNavBtn} onClick={() => setCookStep(c=>c+1)}>Next →</button>
                  : <button style={{ ...s.cookNavBtn, background:"#4caf50" }} onClick={() => { setView("library"); setCookStep(0); }}>Done ✓</button>}
              </div>
              <div style={s.cookIngBox}>
                <div style={s.cookIngTitle}>Ingredients</div>
                {(selectedRecipe.ingredients||[]).map((ing,i) => <div key={i} style={s.cookIng}>• {ing}</div>)}
              </div>
            </div>
          </div>
        );
      }

      if (view === "detail" && selectedRecipe) return (
        <div style={s.screen}>
          <div style={s.detailHeader}>
            <button style={s.backBtn} onClick={() => setView("library")}>← Back</button>
            <button style={{ ...s.backBtn, color:"#e07b4a" }} onClick={() => deleteRecipe(selectedRecipe.id)}>Delete</button>
          </div>
          {selectedRecipe.photo_url && <img src={selectedRecipe.photo_url} alt="" style={s.detailPhoto} />}
          <div style={s.detailBody}>
            <div style={s.detailCat}>{selectedRecipe.category}</div>
            <h2 style={s.detailTitle}>{selectedRecipe.title}</h2>
            {selectedRecipe.source_url && <a href={selectedRecipe.source_url} target="_blank" style={s.detailLink}>View original source ↗</a>}
            <div style={s.sectionLabel}>Ingredients</div>
            {(selectedRecipe.ingredients||[]).map((ing,i) => <div key={i} style={s.listItem}>• {ing}</div>)}
            <div style={s.sectionLabel}>Steps</div>
            {(selectedRecipe.steps||[]).map((step,i) => <div key={i} style={s.listItem}><span style={s.stepNum}>{i+1}</span> {step}</div>)}
            <div style={s.sectionLabel}>Add to week plan</div>
            <div style={s.dayGrid}>
              {DAYS.map(day => (
                <button key={day} style={{ ...s.dayBtn, ...(weekPlan[day]?.recipe_id===selectedRecipe.id?s.dayBtnActive:{}) }}
                  onClick={() => assignDay(day, selectedRecipe.id)}>{day.slice(0,3)}</button>
              ))}
            </div>
            <button style={s.cookBtn} onClick={() => { setCookStep(0); setView("cook"); }}>🍳 Start
