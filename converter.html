<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: Georgia, serif; color: #eee; min-height: 100vh; padding: 32px 20px; }
    .wrap { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 26px; color: #fff; margin-bottom: 6px; }
    .sub { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    textarea {
      width: 100%; background: #1a1a1a; border: 1px solid #333;
      border-radius: 12px; color: #eee; padding: 12px 14px;
      font-size: 15px; font-family: monospace; resize: vertical;
    }
    .btn {
      background: #e07b4a; border: none; border-radius: 12px; color: #fff;
      font-size: 16px; font-weight: 700; padding: 13px 0; width: 100%;
      cursor: pointer; margin-top: 12px; font-family: Georgia, serif;
    }
    .btn:disabled { opacity: 0.6; }
    .error { color: #e07b4a; font-size: 14px; margin-top: 12px; background: #1a1a1a; border-radius: 10px; padding: 10px 14px; }
    .results { margin-top: 28px; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .count { color: #888; font-size: 13px; }
    .dl-all { background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #eee; font-size: 13px; padding: 6px 14px; cursor: pointer; font-family: Georgia, serif; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .card-cat { font-size: 11px; color: #e07b4a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
    .card-title { font-size: 16px; color: #fff; font-weight: 600; }
    .card-meta { font-size: 12px; color: #666; margin-top: 4px; }
    .dl-btn { background: #e07b4a; border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 700; padding: 8px 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: Georgia, serif; }
    .back { display: inline-block; color: #888; font-size: 13px; text-decoration: none; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="back">← Back to recipes</a>
    <h1>🍴 Recipe Converter</h1>
    <p class="sub">Paste one or more links (one per line) and convert them to JSON files for the recipe app.</p>
    <textarea id="input" rows="5" placeholder="https://www.example.com/pasta-recipe&#10;https://www.instagram.com/p/abc123&#10;https://..."></textarea>
    <button class="btn" id="convertBtn" onclick="convert()">Convert →</button>
    <div id="error" class="error" style="display:none"></div>
    <div id="results" class="results" style="display:none">
      <div class="results-header">
        <span class="count" id="count"></span>
        <button class="dl-all" id="dlAll" onclick="downloadAll()" style="display:none">Download all</button>
      </div>
      <div id="cards"></div>
    </div>
  </div>

  <script>
    let recipes = [];

    async function convert() {
      const input = document.getElementById("input").value.trim();
      if (!input) return;

      const btn = document.getElementById("convertBtn");
      btn.disabled = true;
      btn.textContent = "Converting...";
      document.getElementById("error").style.display = "none";
      document.getElementById("results").style.display = "none";
      recipes = [];

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 4000,
            system: `You are a recipe extraction assistant. The user will give you one or more URLs or recipe text. For each recipe, extract and return a JSON array where each item has this exact structure:
{"title":"Recipe name","category":"Dinner","source_url":"the original url or null","photo_url":null,"ingredients":["ingredient 1","ingredient 2"],"steps":["step 1","step 2"]}
Return ONLY a valid JSON array, no markdown, no explanation, no backticks. If you cannot access a URL, do your best based on what you know or return a placeholder with the URL as source_url.`,
            messages: [{ role: "user", content: input }]
          })
        });

        const data = await response.json();
        const text = (data.content || []).find(b => b.type === "text")?.text || "";
        const clean = text.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(clean);
        recipes = Array.isArray(parsed) ? parsed : [parsed];
        renderResults();
      } catch (e) {
        document.getElementById("error").style.display = "block";
        document.getElementById("error").textContent = "Something went wrong. Make sure the links are valid and try again.";
      }

      btn.disabled = false;
      btn.textContent = "Convert →";
    }

    function renderResults() {
      const container = document.getElementById("cards");
      container.innerHTML = "";
      document.getElementById("count").textContent = `${recipes.length} recipe${recipes.length > 1 ? "s" : ""} found`;
      document.getElementById("dlAll").style.display = recipes.length > 1 ? "block" : "none";
      recipes.forEach((r, i) => {
        container.innerHTML += `
          <div class="card">
            <div>
              <div class="card-cat">${r.category || "Dinner"}</div>
              <div class="card-title">${r.title}</div>
              <div class="card-meta">${(r.ingredients||[]).length} ingredients · ${(r.steps||[]).length} steps</div>
            </div>
            <button class="dl-btn" onclick="download(${i})">⬇ JSON</button>
          </div>`;
      });
      document.getElementById("results").style.display = "block";
    }

    function download(i) {
      const r = recipes[i];
      const blob = new Blob([JSON.stringify(r, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${r.title.replace(/[^a-z0-9]/gi, "_").toLowerCase()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadAll() {
      recipes.forEach((_, i) => download(i));
    }
  </script>
</body>
</html>
